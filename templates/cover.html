<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: {{ page_width }}px;
            height: {{ page_height }}px;
            background: linear-gradient(135deg, {{ colors.primary }} 0%, {{ colors.secondary }} 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰元素 */
        .deco-circle-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            top: -100px;
            right: -100px;
        }
        
        .deco-circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -80px;
            left: -80px;
        }
        
        .deco-line {
            position: absolute;
            width: 120px;
            height: 4px;
            background: {{ colors.accent }};
            top: 80px;
            left: 60px;
            border-radius: 2px;
        }
        
        .deco-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: {{ colors.accent }};
            border-radius: 50%;
            bottom: 120px;
            right: 80px;
        }
        
        /* 内容区域 */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
            max-width: 780px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            font-weight: 500;
            padding: 8px 24px;
            border-radius: 20px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .title {
            color: #ffffff;
            font-size: 56px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 30px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 50px;
        }
        
        .divider {
            width: 60px;
            height: 3px;
            background: {{ colors.accent }};
            margin: 0 auto 30px;
            border-radius: 2px;
        }
        
        .guest-info {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            font-weight: 400;
        }
        
        .guest-info strong {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }
        
        /* 底部来源 */
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>
    <div class="deco-line"></div>
    <div class="deco-dot"></div>
    
    <div class="content">
        <div class="badge">播 客 笔 记</div>
        <h1 class="title">{{ title }}</h1>
        <p class="subtitle">{{ podcast_name }} | {{ episode_title }}</p>
        <div class="divider"></div>
        {% if guests %}
        <p class="guest-info">嘉宾：<strong>{{ guests }}</strong></p>
        {% endif %}
    </div>
    
    <div class="footer">
        🎙️ 内容提炼自播客《{{ podcast_name }}》
    </div>
</body>
</html>
