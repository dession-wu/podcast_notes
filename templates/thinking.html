<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: {{ page_width }}px;
            height: {{ page_height }}px;
            background: linear-gradient(135deg, {{ colors.primary }} 0%, {{ colors.secondary }} 100%);
            display: flex;
            flex-direction: column;
            padding: 45px 50px;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰元素 */
        .deco-circle-1 {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            top: -80px;
            right: -80px;
        }
        
        .deco-circle-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -60px;
            left: -60px;
        }
        
        .deco-line {
            position: absolute;
            width: 80px;
            height: 3px;
            background: {{ colors.accent }};
            top: 55px;
            left: 50px;
            border-radius: 2px;
        }
        
        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }
        
        .header-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        
        .header-title {
            font-size: 30px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
        }
        
        .header-subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            margin-top: 6px;
        }
        
        /* 金句列表 - 弹性均分布局 */
        .quotes-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            min-height: 0;
            justify-content: space-evenly;
        }
        
        /* 金句卡片 - 弹性均分 */
        .quote-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 22px 26px;
            border: 1px solid rgba(255,255,255,0.15);
            flex: 1 1 0;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 0;
        }
        
        .quote-mark {
            font-size: 36px;
            color: {{ colors.accent }};
            opacity: 0.6;
            line-height: 1;
            font-family: Georgia, serif;
            flex-shrink: 0;
        }
        
        .quote-text {
            font-size: 21px;
            color: #ffffff;
            line-height: 1.55;
            font-weight: 500;
            flex: 1;
        }
        
        /* 页脚 */
        .footer {
            margin-top: auto;
            padding-top: 16px;
            text-align: center;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }
        
        .footer-text {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        
        .page-indicator {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>
    <div class="deco-line"></div>
    
    <div class="header">
        <div class="header-icon">💭</div>
        <h1 class="header-title">思考</h1>
        <p class="header-subtitle">核心认知与商业思维</p>
    </div>
    
    <div class="quotes-list">
        {% for reflection in reflections %}
        <div class="quote-card">
            <div class="quote-mark">"</div>
            <p class="quote-text">{{ reflection }}</p>
        </div>
        {% endfor %}
    </div>
    
    <div class="footer">
        <p class="footer-text">🎙️ 内容提炼自播客《{{ source_info.podcast_name or '未知播客' }}》</p>
        <p class="page-indicator">{{ page_num }} / {{ total_pages }}</p>
    </div>
</body>
</html>
