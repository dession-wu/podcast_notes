<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'NotoSansSC';
            src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'), local('SimHei'), sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'NotoSansSC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            width: 900px;
            height: 1200px;
            background: linear-gradient(180deg, #fff1f2 0%, #ffe4e6 100%);
            display: flex;
            flex-direction: column;
            padding: 40px 48px;
            position: relative;
            overflow: hidden;
            color: #881337;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ec4899 0%, #8b5cf6 50%, #f59e0b 100%);
        }
        .bg-deco {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 95% 5%, rgba(139, 92, 246, 0.06) 0%, transparent 40%);
            pointer-events: none;
        }
        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #fecdd3;
        }
        .header-icon {
            font-size: 44px;
            margin-bottom: 12px;
        }
        .header-title {
            font-size: 34px;
            font-weight: 900;
            color: #881337;
            letter-spacing: 2px;
        }
        /* 要点列表 */
        .checklist {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: #ffffff;
            padding: 18px 22px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.06);
            border: 2px solid #ffe4e6;
        }
        .check-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
            color: #ffffff;
            font-weight: 700;
        }
        .check-text {
            font-size: 16px;
            color: #be185d;
            line-height: 1.6;
            font-weight: 500;
        }
        /* 总结感悟 */
        .conclusion {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.06) 0%, rgba(139, 92, 246, 0.06) 100%);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 24px;
            border: 2px solid #fecdd3;
        }
        .conclusion-label {
            font-size: 12px;
            color: #ec4899;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .conclusion-text {
            font-size: 16px;
            color: #be185d;
            line-height: 1.7;
            font-style: italic;
        }
        /* 来源信息框 */
        .source-box {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            border-radius: 20px;
            padding: 28px;
            color: #ffffff;
            box-shadow: 0 8px 28px rgba(236, 72, 153, 0.3);
        }
        .source-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.85;
            letter-spacing: 1px;
        }
        .source-item {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .source-item strong {
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="bg-deco"></div>

    <div class="header">
        <div class="header-icon">&#128204;</div>
        <h2 class="header-title">核心要点复盘</h2>
    </div>

    <div class="checklist">
        {% for point in key_points %}
        <div class="check-item">
            <span class="check-icon">&#10003;</span>
            <span class="check-text">{{ point }}</span>
        </div>
        {% endfor %}
    </div>

    {% if conclusion %}
    <div class="conclusion">
        <div class="conclusion-label">&#128173; 听后感悟</div>
        <p class="conclusion-text">{{ conclusion }}</p>
    </div>
    {% endif %}

    <div class="source-box">
        <div class="source-title">
            <span>&#127911;</span>
            内容来源
        </div>
        <div class="source-item">
            播客：《<strong>{{ source_info.podcast_name or '未知播客' }}</strong>》
        </div>
        <div class="source-item">
            期数：<strong>{{ source_info.episode_title or '' }}</strong>
        </div>
        {% if source_info.guests %}
        <div class="source-item">
            嘉宾：<strong>{{ source_info.guests }}</strong>
        </div>
        {% endif %}
    </div>
</body>
</html>
