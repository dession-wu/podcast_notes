<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'NotoSerifSC';
            src: local('Noto Serif SC'), local('Songti SC'), local('SimSun'), Georgia, serif;
        }
        @font-face {
            font-family: 'NotoSansSC';
            src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'), sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'NotoSerifSC', 'Songti SC', Georgia, serif;
            width: 900px;
            height: 1200px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: #0f172a;
        }
        /* 杂志感装饰 — 粗边框 + 几何 */
        .frame {
            position: absolute;
            top: 36px;
            left: 36px;
            right: 36px;
            bottom: 36px;
            border: 4px solid #0f172a;
            pointer-events: none;
        }
        .frame::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid #cbd5e1;
        }
        .corner-tl {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            background: #dc2626;
            z-index: 2;
        }
        .corner-br {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #dc2626;
            z-index: 2;
        }
        /* 背景网格 */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        /* 内容区域 — 严格居中对齐 */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 80px;
            max-width: 740px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .issue-label {
            font-family: 'NotoSansSC', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 10px;
            margin-bottom: 48px;
            text-transform: uppercase;
        }
        .title {
            color: #0f172a;
            font-size: 52px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .divider {
            width: 60px;
            height: 4px;
            background: #dc2626;
            margin: 0 0 36px 0;
        }
        .subtitle {
            font-family: 'NotoSansSC', sans-serif;
            color: #475569;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .meta {
            font-family: 'NotoSansSC', sans-serif;
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: 2px;
        }
        .meta strong {
            color: #0f172a;
            font-weight: 700;
        }
        /* 底部 */
        .footer {
            position: absolute;
            bottom: 56px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'NotoSansSC', sans-serif;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="frame"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="content">
        <div class="issue-label">Podcast Notes</div>
        <h1 class="title">{{ title }}</h1>
        <div class="divider"></div>
        <p class="subtitle">{{ podcast_name }} | {{ episode_title }}</p>
        {% if guests %}
        <p class="meta">嘉宾 <strong>{{ guests }}</strong></p>
        {% endif %}
    </div>

    <div class="footer">
        内容提炼自播客《{{ podcast_name }}》
    </div>
</body>
</html>
