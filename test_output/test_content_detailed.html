<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 900px;
            height: 1200px;
            background: #f7fafc;
            display: flex;
            flex-direction: column;
            padding: 36px 42px;
            position: relative;
            overflow: hidden;
        }
        
        /* 顶部装饰条 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #1a365d 0%, #ed8936 100%);
        }
        
        /* 页眉 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            flex-shrink: 0;
        }
        
        .stage-label {
            font-size: 13px;
            font-weight: 700;
            color: #ed8936;
            background: #fef3c7;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 1px;
        }
        
        .page-num {
            font-size: 42px;
            font-weight: 900;
            color: #1a365d;
            opacity: 0.12;
            line-height: 1;
        }
        
        /* 阶段标题 */
        .stage-title {
            font-size: 22px;
            font-weight: 900;
            color: #1a365d;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        
        .time-range {
            font-size: 14px;
            color: #718096;
            margin-bottom: 14px;
            font-weight: 500;
        }
        
        /* 内容区域 */
        .body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 子话题 */
        .topic-block {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        
        .topic-title {
            font-size: 17px;
            font-weight: 700;
            color: #2d3748;
            line-height: 1.4;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #ed8936;
        }
        
        /* 论述列表 */
        .points-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .point-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            line-height: 1.5;
        }
        
        .tag {
            font-size: 13px;
            font-weight: 700;
            color: #1a365d;
            background: rgba(26, 54, 93, 0.08);
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 1px;
        }
        
        .point-text {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.5;
            flex: 1;
        }
        
        /* 阴影标注 - 核心高亮 */
        .highlight-text {
            background: linear-gradient(120deg, #fef3c7 0%, #fef3c7 100%);
            background-repeat: no-repeat;
            background-size: 100% 42%;
            background-position: 0 88%;
            padding: 0 2px;
            font-weight: 600;
        }
        
        /* 页脚 */
        .footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .source {
            font-size: 12px;
            color: #718096;
        }
        
        .page-indicator {
            font-size: 12px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    
    <div class="header">
        <span class="stage-label">阶段 1</span>
        <span class="page-num">03</span>
    </div>
    
    <h1 class="stage-title">一、技术突围：从软硬之争到扫码支付</h1>
    
    <p class="time-range">📅 2008-2012</p>
    
    
    <div class="body">
        
        <div class="topic-block">
            <h2 class="topic-title">为什么扫码支付成了移动支付主路径？</h2>
            <div class="points-list">
                
                <div class="point-item">
                    <span class="tag">【痛点】</span>
                    <span class="point-text">
                        
                            2010年网关支付成功率仅<span class="highlight-text">50%-60%</span>，用户体验极差
                        
                    </span>
                </div>
                
                <div class="point-item">
                    <span class="tag">【决策】</span>
                    <span class="point-text">
                        
                            放弃NFC硬件方案，选择轻资产、易复制的<span class="highlight-text">二维码技术</span>
                        
                    </span>
                </div>
                
                <div class="point-item">
                    <span class="tag">【结果】</span>
                    <span class="point-text">
                        
                            支付成功率提升至<span class="highlight-text">95%</span>，2011年外部交易占比从30%跃升至70%
                        
                    </span>
                </div>
                
            </div>
        </div>
        
        <div class="topic-block">
            <h2 class="topic-title">为什么是支付宝笑到最后？</h2>
            <div class="points-list">
                
                <div class="point-item">
                    <span class="tag">【数据】</span>
                    <span class="point-text">
                        
                            2014年余额宝规模破<span class="highlight-text">5000亿</span>，用户达1.8亿
                        
                    </span>
                </div>
                
                <div class="point-item">
                    <span class="tag">【案例】</span>
                    <span class="point-text">
                        
                            马云的关键推动：'银行不改变，我们就改变银行'
                        
                    </span>
                </div>
                
            </div>
        </div>
        
    </div>
    
    <div class="footer">
        <span class="source">
            <span>🎙️</span>
            商业就是这样 | 支付宝20年
        </span>
        <span class="page-indicator">3 / 6</span>
    </div>
</body>
</html>
